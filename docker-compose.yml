version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: ai-bi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ai_bi
    ports:
      - "3306:3306"
    volumes:
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: ai-bi-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./database/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
