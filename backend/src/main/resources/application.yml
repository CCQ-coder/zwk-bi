server:
  port: ${AI_BI_SERVER_PORT:8081}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "${AI_BI_DB_URL:jdbc:mysql://localhost:3306/ai_bi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}"
    username: "${AI_BI_DB_USERNAME:root}"
    password: "${AI_BI_DB_PASSWORD:123456}"
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 4
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aibi.bi.domain

clickhouse:
  datasource:
    url: "${AI_BI_CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/ai_bi}"
    username: "${AI_BI_CLICKHOUSE_USERNAME:default}"
    password: "${AI_BI_CLICKHOUSE_PASSWORD:}"

app:
  jwt:
    secret: "${AI_BI_JWT_SECRET:AI_BI_JWT_SECRET_2026_CHANGE_ME_TO_A_LONG_RANDOM_VALUE}"
    expire-hours: ${AI_BI_JWT_EXPIRE_HOURS:12}
  upload:
    path: "${AI_BI_UPLOAD_PATH:D:/bi/jpg}"
