server:
  port: 8081

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_bi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 4
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aibi.bi.domain

clickhouse:
  datasource:
    url: jdbc:clickhouse://localhost:8123/ai_bi
    username: default
    password: ""

app:
  jwt:
    secret: AI_BI_JWT_SECRET_2026_CHANGE_ME_TO_A_LONG_RANDOM_VALUE
    expire-hours: 12
